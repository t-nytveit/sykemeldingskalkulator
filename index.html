<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIWI Sykemeldingskalkulator</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#18961e">
    <link rel="apple-touch-icon" href="k_icon.png">
    <link rel="icon" type="image/png" href="k_icon.png">

    <style>
        :root {
            --primary: #18961e; 
            --bg: #f4f7f6;
            --card: #ffffff;
            --text-muted: #6c757d;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box;
        }

        .container {
            background: var(--card); padding: 30px; border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08); width: 100%; max-width: 400px;
            display: flex; flex-direction: column;
        }

        .logo-container { 
            text-align: center; 
            margin-bottom: 25px; 
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        
        .logo-container:active { transform: scale(0.95); }
        .logo-container img { max-width: 160px; height: auto; }
        
        h2 { color: #333; text-align: center; margin-top: 0; font-size: 1.1rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #444; font-size: 0.9rem; }
        
        input {
            width: 100%; padding: 12px; border: 1.5px solid #dee2e6; border-radius: 10px;
            font-size: 16px; box-sizing: border-box; background-color: #fcfcfc;
        }

        .result-box {
            background: #f1f9f1; padding: 20px; border-radius: 15px; text-align: center;
            margin-top: 20px; border: 1px solid #d4ecd5;
        }

        .result-label { font-size: 0.9rem; color: #444; margin-bottom: 5px; }
        .result-value { font-size: 2.2rem; font-weight: 800; color: var(--primary); line-height: 1; }
        .result-detail { font-size: 1rem; color: #333; font-weight: 600; margin-top: 5px; }
        
        .shift-info {
            margin-top: 20px; padding-top: 15px; border-top: 1.5px solid #d4ecd5;
            text-align: center;
        }

        .shift-label { font-size: 0.85rem; color: #444; margin-bottom: 8px; font-weight: 600; }
        .shift-value { font-size: 1.3rem; color: #333; font-weight: 700; }

        .copyright { margin-top: 30px; text-align: center; font-size: 0.75rem; color: var(--text-muted); }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container" onclick="refreshPage()" title="Nullstill">
        <img src="kiwi-logo-e1620058626739-1024x346.png" alt="KIWI Logo">
    </div>

    <h2>Sykemeldingskalkulator</h2>

    <div class="input-group">
        <label>Stillingsstørrelse (%)</label>
        <input type="number" id="stilling" value="100" oninput="calculate()" inputmode="decimal">
    </div>

    <div class="input-group">
        <label>Sykemeldingsgrad (%)</label>
        <input type="number" id="sykemelding" value="40" oninput="calculate()" inputmode="decimal">
    </div>

    <div class="result-box">
        <div class="result-label">Timer å jobbe pr. uke:</div>
        <div id="result" class="result-value">22,50</div>
        <div id="resultTimeFormat" class="result-detail">(22t 30m)</div>
        
        <div class="shift-info">
            <div class="shift-label">Tilsvarer arbeidsdag (av 7,5t):</div>
            <div id="shiftResult" class="shift-value">4,50 timer</div>
            <div id="shiftTimeFormat" style="font-size: 0.9rem; color: #666;">(4t 30m)</div>
        </div>
    </div>

    <div class="copyright">
        &copy; <span id="year"></span> Thomas Nytveit
    </div>
</div>

<script>
    document.getElementById('year').textContent = new Date().getFullYear();

    function refreshPage() {
        window.location.reload();
    }

    function formatTime(decimalHours) {
        const h = Math.floor(decimalHours);
        const m = Math.round((decimalHours - h) * 60);
        return `(${h}t ${m}m)`;
    }

    function calculate() {
        const stilling = parseFloat(document.getElementById('stilling').value) || 0;
        const sykemelding = parseFloat(document.getElementById('sykemelding').value) || 0;
        const fullUke = 37.5; 
        const fullDag = 7.5;

        // 1. Ukesberegning
        const restArbeidsevneFaktor = (stilling / 100) * ((100 - sykemelding) / 100);
        const timerUke = restArbeidsevneFaktor * fullUke;
        
        document.getElementById('result').innerText = timerUke.toLocaleString('no-NO', { 
            minimumFractionDigits: 2, maximumFractionDigits: 2 
        });
        document.getElementById('resultTimeFormat').innerText = formatTime(timerUke);

        // 2. Beregning av vaktlengde (basert på 7,5t dag)
        // Her regner vi ut rest-prosenten av en full arbeidsdag
        const restProsentAvFullStilling = (100 - sykemelding) / 100;
        const timerVakt = fullDag * restProsentAvFullStilling;

        document.getElementById('shiftResult').innerText = timerVakt.toLocaleString('no-NO', { 
            minimumFractionDigits: 2, maximumFractionDigits: 2 
        }) + " timer";
        document.getElementById('shiftTimeFormat').innerText = formatTime(timerVakt);
    }

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./service-worker.js');
    }

    calculate();
</script>

</body>
</html>
