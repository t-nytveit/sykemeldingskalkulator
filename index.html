<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIWI Sykemeldingskalkulator</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#18961e">
    <link rel="apple-touch-icon" href="k_icon.png">
    <link rel="icon" type="image/png" href="k_icon.png">

    <style>
        :root {
            --primary: #18961e; 
            --bg: #f4f7f6;
            --card: #ffffff;
            --text-muted: #6c757d;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box;
        }

        .container {
            background: var(--card); padding: 30px; border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08); width: 100%; max-width: 400px;
        }

        .logo-container { 
            text-align: center; 
            margin-bottom: 25px; 
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        .logo-container:active { transform: scale(0.95); }
        .logo-container img { max-width: 160px; height: auto; }
        
        h2 { color: #333; text-align: center; margin-top: 0; font-size: 1.1rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #444; font-size: 0.9rem; }
        
        input {
            width: 100%; padding: 12px; border: 1.5px solid #dee2e6; border-radius: 10px;
            font-size: 18px; box-sizing: border-box; background-color: #fcfcfc; text-align: center;
        }

        .status-badge {
            background: #e8f5e9; color: #2e7d32; padding: 8px; border-radius: 10px;
            font-weight: 700; text-align: center; margin-bottom: 20px; font-size: 0.9rem;
            border: 1px solid #c8e6c9;
        }

        .result-section {
            background: #f1f9f1; padding: 20px; border-radius: 15px; text-align: center;
            border: 1px solid #d4ecd5;
        }

        .main-result { margin-bottom: 20px; }
        .result-label { font-size: 0.85rem; color: #444; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
        .result-value { font-size: 2.2rem; font-weight: 800; color: var(--primary); line-height: 1; }
        .result-sub { font-size: 1.1rem; color: #333; font-weight: 600; }

        .divider { height: 1.5px; background: #d4ecd5; margin: 15px 0; }

        .copyright { margin-top: 30px; text-align: center; font-size: 0.75rem; color: var(--text-muted); }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container" onclick="window.location.reload()" title="Nullstill">
        <img src="kiwi-logo-e1620058626739-1024x346.png" alt="KIWI Logo">
    </div>

    <h2>Sykemeldingskalkulator</h2>

    <div id="status" class="status-badge">RESTARBEIDSEVNE: 60% FRISK</div>

    <div class="input-group">
        <label>Stillingsstørrelse (%)</label>
        <input type="number" id="stilling" value="100" oninput="calculate()" inputmode="decimal">
    </div>

    <div class="input-group">
        <label>Sykemeldingsgrad (%)</label>
        <input type="number" id="sykemelding" value="40" oninput="calculate()" inputmode="decimal">
    </div>

    <div class="result-section">
        <div class="main-result">
            <div class="result-label">Timer å jobbe pr. uke:</div>
            <div id="resUke" class="result-value">22,50</div>
            <div id="resUkeKlokke" class="result-sub">22t 30m</div>
        </div>

        <div class="divider"></div>

        <div class="main-result">
            <div class="result-label">Ved full arbeidsdag (7,5t):</div>
            <div id="resDag" class="result-value" style="font-size: 1.8rem;">4,50</div>
            <div id="resDagKlokke" class="result-sub">4t 30m</div>
        </div>
    </div>

    <div class="copyright">
        &copy; <span id="year"></span> Thomas Nytveit
    </div>
</div>

<script>
    document.getElementById('year').textContent = new Date().getFullYear();

    function formatToTime(decimalHours) {
        const h = Math.floor(Math.abs(decimalHours));
        const m = Math.round((Math.abs(decimalHours) - h) * 60);
        return `${h}t ${m}m`;
    }

    function calculate() {
        const stilling = parseFloat(document.getElementById('stilling').value) || 0;
        const sykemelding = parseFloat(document.getElementById('sykemelding').value) || 0;
        
        const restProsent = 100 - sykemelding;
        const restFaktor = restProsent / 100;
        const stillingFaktor = stilling / 100;

        // Oppdater statusbadge
        document.getElementById('status').innerText = `RESTARBEIDSEVNE: ${restProsent}% FRISK`;

        // 1. Ukesberegning (Stillings% x Restarbeidsevne% x 37.5)
        const timerUke = (stillingFaktor * restFaktor) * 37.5;
        document.getElementById('resUke').innerText = timerUke.toLocaleString('no-NO', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        document.getElementById('resUkeKlokke').innerText = formatToTime(timerUke);

        // 2. Dagsberegning (7.5 x Restarbeidsevne%)
        // Vi tar utgangspunkt i en full dag (7,5t) og ser hvor mye av den man skal jobbe
        const timerDag = 7.5 * restFaktor;
        document.getElementById('resDag').innerText = timerDag.toLocaleString('no-NO', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        document.getElementById('resDagKlokke').innerText = formatToTime(timerDag);
    }

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./service-worker.js');
    }

    calculate();
</script>

</body>
</html>
