<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIWI Timekalkulator</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#18961e">
    <link rel="apple-touch-icon" href="k_icon.png">
    <link rel="icon" type="image/png" href="k_icon.png">

    <style>
        :root {
            --primary: #18961e; /* KIWI-grønn */
            --bg: #f4f7f6;
            --card: #ffffff;
            --text-muted: #6c757d;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box;
        }

        .container {
            background: var(--card); padding: 30px; border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08); width: 100%; max-width: 400px;
            display: flex; flex-direction: column;
        }

        .logo-container { text-align: center; margin-bottom: 25px; }
        .logo-container img { max-width: 160px; height: auto; }
        
        h2 { color: #333; text-align: center; margin-top: 0; font-size: 1.1rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #444; font-size: 0.9rem; }
        
        input {
            width: 100%; padding: 12px; border: 1.5px solid #dee2e6; border-radius: 10px;
            font-size: 16px; box-sizing: border-box; background-color: #fcfcfc;
        }

        input:focus { border-color: var(--primary); outline: none; background-color: #fff; }

        .result-box {
            background: #f1f9f1; padding: 20px; border-radius: 15px; text-align: center;
            margin-top: 20px; border: 1px solid #d4ecd5;
        }

        .result-label { font-size: 0.9rem; color: #444; margin-bottom: 5px; }
        .result-value { font-size: 2.2rem; font-weight: 800; color: var(--primary); line-height: 1; }
        .result-detail { font-size: 1rem; color: #333; font-weight: 600; margin-top: 5px; }
        
        .total-box {
            margin-top: 15px; padding-top: 15px; border-top: 1px solid #d4ecd5;
            font-size: 0.9rem; color: #555;
        }

        .copyright { margin-top: 30px; text-align: center; font-size: 0.75rem; color: var(--text-muted); }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <img src="kiwi-logo-e1620058626739-1024x346.png" alt="KIWI Logo">
    </div>

    <h2>Tidskalkulator</h2>

    <div class="input-group">
        <label>Stillingsstørrelse (%)</label>
        <input type="number" id="stilling" value="100" oninput="calculate()" inputmode="decimal">
    </div>

    <div class="input-group">
        <label>Sykemeldingsgrad (%)</label>
        <input type="number" id="sykemelding" value="40" oninput="calculate()" inputmode="decimal">
    </div>

    <div style="display: flex; gap: 10px;">
        <div class="input-group" style="flex: 1;">
            <label>Fra dato</label>
            <input type="date" id="startDate" oninput="calculate()">
        </div>
        <div class="input-group" style="flex: 1;">
            <label>Til dato</label>
            <input type="date" id="endDate" oninput="calculate()">
        </div>
    </div>

    <div class="result-box">
        <div class="result-label">Timer å jobbe pr. uke:</div>
        <div id="result" class="result-value">22,50</div>
        <div id="resultTimeFormat" class="result-detail">(22t 30m)</div>
        
        <div id="totalSection" class="total-box" style="display: none;">
            Totalt for hele perioden (<span id="daysDisplay">0</span> dager):<br>
            <strong><span id="totalHours">0,00</span> timer</strong>
        </div>
    </div>

    <div class="copyright">
        &copy; <span id="year"></span> Thomas Nytveit
    </div>
</div>

<script>
    document.getElementById('year').textContent = new Date().getFullYear();

    function calculate() {
        const stilling = parseFloat(document.getElementById('stilling').value) || 0;
        const sykemelding = parseFloat(document.getElementById('sykemelding').value) || 0;
        const startVal = document.getElementById('startDate').value;
        const endVal = document.getElementById('endDate').value;
        const fullUke = 37.5; 

        const restArbeidsevneFaktor = (stilling / 100) * ((100 - sykemelding) / 100);
        const timerUke = restArbeidsevneFaktor * fullUke;
        
        document.getElementById('result').innerText = timerUke.toLocaleString('no-NO', { 
            minimumFractionDigits: 2, maximumFractionDigits: 2 
        });

        const hUke = Math.floor(timerUke);
        const mUke = Math.round((timerUke - hUke) * 60);
        document.getElementById('resultTimeFormat').innerText = `(${hUke}t ${mUke}m)`;

        const totalBox = document.getElementById('totalSection');
        if (startVal && endVal) {
            const start = new Date(startVal);
            const end = new Date(endVal);
            
            if (end >= start) {
                const diffTime = Math.abs(end - start);
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1;
                const timerDag = timerUke / 7;
                const totaltTimer = timerDag * diffDays;

                totalBox.style.display = 'block';
                document.getElementById('daysDisplay').innerText = diffDays;
                document.getElementById('totalHours').innerText = totaltTimer.toLocaleString('no-NO', { 
                    minimumFractionDigits: 2, maximumFractionDigits: 2 
                });
            } else {
                totalBox.style.display = 'none';
            }
        } else {
            totalBox.style.display = 'none';
        }
    }

    // Registrer Service Worker for offline bruk
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./service-worker.js');
    }

    calculate();
</script>

</body>
</html>
